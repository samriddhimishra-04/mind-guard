<aside class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <div class="logo" *ngIf="!isCollapsed">
      <span class="logo-icon">🧠</span>
      <span class="logo-text">Mind-Guard</span>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()" [title]="isCollapsed ? 'Expand' : 'Collapse'">
      {{ isCollapsed ? '→' : '←' }}
    </button>
  </div>

  <nav class="sidebar-nav">
    <div *ngFor="let item of getVisibleItems()" class="nav-item" [class.active]="isActive(item.route)">
      <button class="nav-link" (click)="navigateTo(item.route)" [title]="item.label">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
      </button>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-section" *ngIf="currentUser && !isCollapsed">
      <div class="user-avatar">👤</div>
      <div class="user-info">
        <div class="user-name">{{ currentUser.firstName }}</div>
        <div class="user-role">{{ currentUser.role }}</div>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()" [title]="isCollapsed ? 'Logout' : ''">
      <span class="logout-icon">🚪</span>
      <span class="logout-text" *ngIf="!isCollapsed">Logout</span>
    </button>
  </div>
</aside>
